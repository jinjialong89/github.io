<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }
    header {
      padding: 80px 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      opacity: 0.8;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #00c6ff;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn:hover {
      background: #0072ff;
    }
    .section {
      padding: 60px 20px;
    }
    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.05);
    }
    footer {
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <header>
    <h1>你好，我是JIN 🚀</h1>
    <p>一个正在变强的开发者 / 玩家 / 创造者</p>
    <a href="#about" class="btn">了解我</a>
  </header>

  <section id="about" class="section">
    <h2>关于我</h2>
    <p>这里写你的介绍，比如：喜欢游戏、编程、探索世界。</p>
  </section>

  <section class="section">
    <h2>我的技能</h2>
    <div class="card-container">
      <div class="card">💻 编程</div>
      <div class="card">🎮 游戏</div>
      <div class="card">⚔️ 创造</div>
    </div>
  </section>

  <section class="section">
    <h2>联系方式</h2>
    <p>Email: your@email.com</p>
  </section>

  <footer>
    © 2026 JIN - All Rights Reserved
  </footer>

</body>
</html>
